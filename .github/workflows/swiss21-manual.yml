name: Apply swiss.21 source changes

# Temporary release workflow; remove after swiss.21 is committed.
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/swiss21-manual.yml

permissions:
  contents: write

jobs:
  apply-test-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Apply swiss.21 changes
        shell: python
        run: |
          from pathlib import Path
          import json

          def replace_once(path: str, old: str, new: str) -> None:
              p = Path(path)
              text = p.read_text(encoding="utf-8-sig")
              if old not in text:
                  raise SystemExit(f"Expected source block not found in {path}")
              p.write_text(text.replace(old, new, 1), encoding="utf-8")

          version = Path("VERSION").read_text(encoding="utf-8-sig").strip()
          if version == "2.1.1-swiss.21":
              raise SystemExit("swiss.21 is already applied")
          if version != "2.1.1-swiss.20":
              raise SystemExit(f"Expected 2.1.1-swiss.20, found {version}")

          replace_once(
              "backend/src/controllers/invoices.ts",
              '''  if (\n    inv.status === "paid" ||\n    inv.status === "voided" ||\n    inv.status === "complete"\n  ) {\n    return inv;\n  }''',
              '''  // Only issued invoices can become overdue. A draft with a past due date\n  // remains a draft until it is sent.\n  if (inv.status !== "sent") {\n    return inv;\n  }''',
          )

          detail = Path("frontend/src/routes/invoices/[id]/+page.svelte")
          detail_text = detail.read_text(encoding="utf-8-sig")
          detail_text = detail_text.replace(
              'let t = getContext("i18n") as (key: string) => string;',
              'let t = getContext("i18n") as (key: string, params?: Record<string, string | number>) => string;',
              1,
          )
          old_confirm = '''  function confirmEditNavigation(event: MouseEvent) {\n    if (!allowProtectedInvoiceChanges || !isRetentionProtectedInvoice) return;\n    if (!confirm(t("You are about to edit a sent/paid invoice. Ensure this is legally allowed in your jurisdiction. Continue?"))) {\n      event.preventDefault();\n    }\n  }'''
          new_confirm = '''  function confirmEditNavigation(event: MouseEvent) {\n    if (!allowProtectedInvoiceChanges || !isRetentionProtectedInvoice) return;\n    const message = t(\n      "You are about to edit an issued invoice with status {{status}}. Ensure this is legally allowed in your jurisdiction. Continue?",\n      { status: statusLabel(invoice?.status) },\n    );\n    if (!confirm(message)) {\n      event.preventDefault();\n    }\n  }'''
          if old_confirm not in detail_text:
              raise SystemExit("Expected edit confirmation block not found")
          detail.write_text(detail_text.replace(old_confirm, new_confirm, 1), encoding="utf-8")

          edit = Path("frontend/src/routes/invoices/[id]/edit/+page.svelte")
          edit_text = edit.read_text(encoding="utf-8-sig")
          edit_text = edit_text.replace(
              'let t = getContext("i18n") as (key: string) => string;',
              'let t = getContext("i18n") as (key: string, params?: Record<string, string | number>) => string;',
              1,
          )
          marker = '  const formId = "invoice-edit-form";\n'
          helper = '''  const formId = "invoice-edit-form";\n\n  function statusLabel(status?: string) {\n    const labels: Record<string, string> = {\n      draft: "Draft",\n      sent: "Sent",\n      complete: "Complete",\n      paid: "Paid",\n      overdue: "Overdue",\n      voided: "Voided",\n    };\n    return status ? t(labels[status] || status) : "-";\n  }\n'''
          if marker not in edit_text:
              raise SystemExit("Expected edit page marker not found")
          edit_text = edit_text.replace(marker, helper, 1)
          old_warning = '{t("Warning: you are editing a sent/paid invoice. Ensure this is legally allowed in your jurisdiction.")}'
          new_warning = '{t("Warning: you are editing an issued invoice with status {{status}}. Ensure this is legally allowed in your jurisdiction.", { status: statusLabel(data.invoice?.status) })}'
          if old_warning not in edit_text:
              raise SystemExit("Expected edit warning text not found")
          edit.write_text(edit_text.replace(old_warning, new_warning, 1), encoding="utf-8")

          translations = {
              "en": {
                  "You are about to edit an issued invoice with status {{status}}. Ensure this is legally allowed in your jurisdiction. Continue?": "You are about to edit an issued invoice with status {{status}}. Ensure this is legally allowed in your jurisdiction. Continue?",
                  "Warning: you are editing an issued invoice with status {{status}}. Ensure this is legally allowed in your jurisdiction.": "Warning: you are editing an issued invoice with status {{status}}. Ensure this is legally allowed in your jurisdiction.",
              },
              "de": {
                  "You are about to edit an issued invoice with status {{status}}. Ensure this is legally allowed in your jurisdiction. Continue?": "Sie sind dabei, eine bereits ausgestellte Rechnung mit dem Status „{{status}}“ zu bearbeiten. Stellen Sie sicher, dass dies in Ihrer Rechtsordnung zulässig ist. Fortfahren?",
                  "Warning: you are editing an issued invoice with status {{status}}. Ensure this is legally allowed in your jurisdiction.": "Warnung: Sie bearbeiten eine bereits ausgestellte Rechnung mit dem Status „{{status}}“. Stellen Sie sicher, dass dies in Ihrer Rechtsordnung zulässig ist.",
              },
              "nl": {
                  "You are about to edit an issued invoice with status {{status}}. Ensure this is legally allowed in your jurisdiction. Continue?": "U staat op het punt een reeds uitgegeven factuur met de status ‘{{status}}’ te bewerken. Controleer of dit wettelijk is toegestaan in uw rechtsgebied. Doorgaan?",
                  "Warning: you are editing an issued invoice with status {{status}}. Ensure this is legally allowed in your jurisdiction.": "Waarschuwing: u bewerkt een reeds uitgegeven factuur met de status ‘{{status}}’. Controleer of dit wettelijk is toegestaan in uw rechtsgebied.",
              },
              "pt-br": {
                  "You are about to edit an issued invoice with status {{status}}. Ensure this is legally allowed in your jurisdiction. Continue?": "Você está prestes a editar uma fatura já emitida com o status “{{status}}”. Verifique se isso é permitido legalmente em sua jurisdição. Continuar?",
                  "Warning: you are editing an issued invoice with status {{status}}. Ensure this is legally allowed in your jurisdiction.": "Aviso: você está editando uma fatura já emitida com o status “{{status}}”. Verifique se isso é permitido legalmente em sua jurisdição.",
              },
          }
          for locale, values in translations.items():
              p = Path(f"frontend/src/lib/i18n/locales/{locale}.json")
              data = json.loads(p.read_text(encoding="utf-8-sig"))
              data.update(values)
              p.write_text(json.dumps(data, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")

          Path("VERSION").write_text("2.1.1-swiss.21\n", encoding="utf-8")

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Validate backend
        run: |
          cd backend
          deno fmt --check src/controllers/invoices.ts
          deno test -A

      - name: Validate frontend
        run: |
          cd frontend
          bun install --frozen-lockfile
          bun run check

      - name: Commit swiss.21 to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION backend/src/controllers/invoices.ts frontend/src/routes/invoices/[id]/+page.svelte frontend/src/routes/invoices/[id]/edit/+page.svelte frontend/src/lib/i18n/locales/*.json
          git commit -m "Fix overdue drafts and protected edit warnings (swiss.21)"
          git push origin HEAD:main
