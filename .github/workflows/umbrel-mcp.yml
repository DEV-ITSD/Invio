name: Build Invio Umbrel MCP

on:
  pull_request:
    paths:
      - "umbrel-mcp/**"
      - ".github/workflows/umbrel-mcp.yml"
  push:
    branches: [main]
    paths:
      - "umbrel-mcp/**"
      - ".github/workflows/umbrel-mcp.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: umbrel-mcp/package-lock.json

      - name: Test MCP server
        working-directory: umbrel-mcp
        run: |
          npm ci
          npm test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.11.1

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3.5.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally publish image
        uses: docker/build-push-action@v6.18.0
        with:
          context: umbrel-mcp
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/dev-itsd/invio-umbrel-mcp:latest
            ghcr.io/dev-itsd/invio-umbrel-mcp:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

