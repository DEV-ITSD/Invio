name: Verify swiss.23 container images

# Trigger the one-time swiss.23 verification after the release merge.
on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/verify-swiss23.yml

permissions:
  issues: write
  pull-requests: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for both swiss.23 images
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -u
          backend="ghcr.io/dev-itsd/invio-backend:v2.1.1-swiss.23"
          frontend="ghcr.io/dev-itsd/invio-frontend:v2.1.1-swiss.23"

          for attempt in $(seq 1 60); do
            if docker manifest inspect "$backend" >/dev/null 2>&1 && \
               docker manifest inspect "$frontend" >/dev/null 2>&1; then
              gh pr comment 29 --repo "${{ github.repository }}" --body "✅ swiss.23 verified: both GHCR images are available:\n- $backend\n- $frontend"
              exit 0
            fi
            sleep 10
          done

          gh pr comment 29 --repo "${{ github.repository }}" --body "❌ swiss.23 verification failed: one or both GHCR images were not available after 10 minutes."
          exit 1
