name: Build and Release Version

on:
  push:
    branches: [main]
    paths:
      - VERSION

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [backend, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: bash
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          test -n "$version"
          echo "tag=v${version#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.11.1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3.5.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository
        id: repo
        shell: bash
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Copy VERSION into frontend build context
        if: ${{ matrix.image == 'frontend' }}
        run: cp VERSION frontend/VERSION

      - name: Build and push versioned image
        uses: docker/build-push-action@v6.18.0
        with:
          context: ${{ matrix.image }}
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: |
            type=registry,ref=ghcr.io/${{ steps.repo.outputs.name }}-${{ matrix.image }}:buildcache
            type=gha
          cache-to: type=gha,mode=max
          tags: ghcr.io/${{ steps.repo.outputs.name }}-${{ matrix.image }}:${{ steps.version.outputs.tag }}

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: bash
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          test -n "$version"
          echo "tag=v${version#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: gh release create "$TAG" --target "$GITHUB_SHA" --title "$TAG" --generate-notes
